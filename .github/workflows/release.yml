name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build portable + NSIS installer
        run: wails build -tags "with_gvisor,with_clash_api" -nsis -platform windows/amd64 -ldflags "-s -w"

      - name: Rename portable binary
        shell: pwsh
        run: Rename-Item build\bin\Shunnel.exe Shunnel-portable.exe

      - name: List output
        shell: pwsh
        run: Get-ChildItem build/bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shunnel-windows-amd64
          path: |
            build/bin/Shunnel-portable.exe
            build/bin/Shunnel-amd64-installer.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/Shunnel-portable.exe
            build/bin/Shunnel-amd64-installer.exe
          generate_release_notes: true
